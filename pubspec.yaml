name: telnor
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  auto_hyphenating_text: ^0.3.1
  auto_size_text: ^3.0.0
  biometric_signature: ^10.2.0
  bloc: ^9.2.0
  built_collection: ^5.1.1
  cupertino_icons: ^1.0.8
  device_info_plus: ^12.3.0
  dio: ^5.9.2
  encrypt: ^5.0.3
  equatable: ^2.0.8
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_autofill_service:
    path: flutter_autofill_service
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  fluttertoast: ^9.0.0
  flutter_pdfview: ^1.4.4
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.3
  flutter_webview_plugin:
    path: flutter_webview_plugin-master
  font_awesome_flutter: ^10.12.0
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_fonts: ^8.0.2
  http: ^1.6.0
  image: ^4.8.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  json_annotation: ^4.11.0
  local_auth: ^3.0.1
  location: ^8.0.1
  mime: ^2.0.0
  mobile_scanner: ^7.2.0
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  privacy_screen:
    path: privacy_screen-master
  qr_flutter: ^4.1.0
  rxdart: ^0.28.0
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.1

dev_dependencies:
  build_runner: ^2.12.2
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 21

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Medium.ttf
          weight: 500
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
        - asset: fonts/Roboto-Italic.ttf
          style: italic
    - family: CustomIcons
      fonts:
        - asset: fonts/CustomIcons.ttf

  assets:
    - assets/
    - assets/user_default.png
    - js/lib/other/prototypes.js
    - js/lib/srp6a/thinbus-srp6a-sha256-versioned.js
    - js/lib/srp6a/thinbus-srp-config.js
    - js/lib/elliptic.min.js
    - js/lib/elliptic.min.js
    - js/lib/forge.min.js
    - js/lib/pcrypt.js
    - js/lib/pcrypt.config.js
    - js/lib/
    - js/_.js
    - .env


analyzer:
  errors:
    invalid_annotation_target: ignore